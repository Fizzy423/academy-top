{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        /* Теперь это должно работать без ошибок доступа */
        @font-face {
            font-family: 'DejaVuSans';
            src: url("{% static 'fonts/DejaVuSans.ttf' %}");
        }

        @font-face {
            font-family: 'DejaVuSans-Bold';
            src: url("{% static 'fonts/DejaVuSans-Bold.ttf' %}");
        }

        body { 
            font-family: 'DejaVuSans', sans-serif; 
        }
        h1, th { 
            font-family: 'DejaVuSans-Bold', sans-serif; 
        }
    </style>
</head>
<body>
    <h1>Отчет по абитуриентам</h1>
    <p>Дата формирования: {{ generated_date|date:"d.m.Y H:i" }}</p>
    
    <table>
        <thead>
            <tr>
                <th>ФИО</th>
                <th>Класс</th>
                <th>Телефон</th>
            </tr>
        </thead>
        <tbody>
            {% for a in abiturients %}
            <tr>
                <td>{{ a.fio }}</td>
                <td>{{ a.class_of_entry }}</td>
                <td>{{ a.phone }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
